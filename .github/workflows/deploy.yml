name: Techno Serverless CI/CD Pipeline

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip test jobs'
        required: false
        default: 'false'
        type: boolean

env:
  AWS_REGION: us-east-1
  APP_NAME: techno-codedeploy-app
  DEPLOYMENT_GROUP: techno-codedeploy-group
  SNS_TOPIC_ARN: ${{ secrets.SNS_TOPIC_ARN }}

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1: Track fork & notify owner
  # ─────────────────────────────────────────────────────────────
  track-and-notify-owner:
    name: "🔍 Track Repository & Notify Owner"
    runs-on: ubuntu-latest
    outputs:
      is_fork: ${{ steps.check_fork.outputs.is_fork }}
      repo_owner: ${{ steps.check_fork.outputs.repo_owner }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check if repository is a fork
        id: check_fork
        run: |
          IS_FORK="${{ github.event.repository.fork }}"
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.repository }}"
          echo "is_fork=$IS_FORK" >> $GITHUB_OUTPUT
          echo "repo_owner=$OWNER" >> $GITHUB_OUTPUT
          echo "Repository: $REPO | Fork: $IS_FORK | Owner: $OWNER"

      - name: Configure AWS credentials
        if: steps.check_fork.outputs.is_fork == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Notify owner about fork via SNS
        if: steps.check_fork.outputs.is_fork == 'true'
        run: |
          MESSAGE="⚠️ Fork Detected!\n\nRepository: ${{ github.repository }}\nOwner: ${{ github.repository_owner }}\nActor: ${{ github.actor }}\nBranch: ${{ github.ref_name }}\nCommit: ${{ github.sha }}\nTimestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          aws sns publish \
            --topic-arn "$SNS_TOPIC_ARN" \
            --subject "⚠️ Fork Detected: ${{ github.repository }}" \
            --message "$MESSAGE" \
            --region $AWS_REGION

      - name: Log pipeline start
        run: |
          echo "✅ Pipeline started by: ${{ github.actor }}"
          echo "📦 Commit: ${{ github.sha }}"
          echo "🌿 Branch: ${{ github.ref_name }}"
          echo "⏰ Time: $(date -u +%Y-%m-%dT%H:%M:%SZ)"

  # ─────────────────────────────────────────────────────────────
  # JOB 2: Test - Syntax validation & Linting
  # ─────────────────────────────────────────────────────────────
  test:
    name: "🧪 Test & Lint Lambda Functions"
    runs-on: ubuntu-latest
    needs: track-and-notify-owner
    if: ${{ github.event.inputs.skip_tests != 'true' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install testing dependencies
        run: |
          pip install flake8 pytest boto3 moto[all]

      - name: Validate Python syntax - order_management
        run: python -m py_compile lambda/order_management/lambda_function.py && echo "✅ order_management"

      - name: Validate Python syntax - process_payment
        run: python -m py_compile lambda/process_payment/lambda_function.py && echo "✅ process_payment"

      - name: Validate Python syntax - update_inventory
        run: python -m py_compile lambda/update_inventory/lambda_function.py && echo "✅ update_inventory"

      - name: Validate Python syntax - send_notification
        run: python -m py_compile lambda/send_notification/lambda_function.py && echo "✅ send_notification"

      - name: Validate Python syntax - generate_report
        run: python -m py_compile lambda/generate_report/lambda_function.py && echo "✅ generate_report"

      - name: Validate Python syntax - init_db
        run: python -m py_compile lambda/init_db/lambda_function.py && echo "✅ init_db"

      - name: Validate Python syntax - health_check
        run: python -m py_compile lambda/health_check/lambda_function.py && echo "✅ health_check"

      - name: Run flake8 linting (E9, F63, F7, F82 only - critical errors)
        run: |
          flake8 lambda/ \
            --count \
            --select=E9,F63,F7,F82 \
            --show-source \
            --statistics
          echo "✅ Linting passed"

      - name: Validate Step Functions ASL JSON
        run: |
          python -c "
          import json
          with open('step_functions/order-workflow.json') as f:
              data = json.load(f)
          assert 'StartAt' in data
          assert 'States' in data
          print('✅ Step Functions ASL JSON is valid')
          print(f'   States: {list(data[\"States\"].keys())}')
          "

      - name: Validate AppSpec YAML
        run: |
          pip install pyyaml
          python -c "
          import yaml
          with open('codedeploy/appspec.yml') as f:
              data = yaml.safe_load(f)
          print('✅ AppSpec YAML is valid')
          "

      - name: Validate Frontend HTML
        run: |
          python -c "
          from html.parser import HTMLParser
          class Validator(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.errors = []
          with open('frontend/index.html') as f:
              content = f.read()
          v = Validator()
          v.feed(content)
          print('✅ Frontend HTML is valid')
          print(f'   File size: {len(content)} bytes')
          "

  # ─────────────────────────────────────────────────────────────
  # JOB 3: Deploy Lambda via CodeDeploy
  # ─────────────────────────────────────────────────────────────
  deploy-lambda:
    name: "🚀 Deploy Lambda Functions (Blue/Green)"
    runs-on: ubuntu-latest
    needs: [track-and-notify-owner, test]
    if: github.ref == 'refs/heads/master'

    strategy:
      matrix:
        function:
          - name: order-management
            dir: order_management
          - name: process-payment
            dir: process_payment
          - name: update-inventory
            dir: update_inventory
          - name: send-notification
            dir: send_notification
          - name: generate-report
            dir: generate_report
          - name: init-db
            dir: init_db
          - name: health-check
            dir: health_check

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Package Lambda - techno-lambda-${{ matrix.function.name }}
        run: |
          FUNC_NAME="techno-lambda-${{ matrix.function.name }}"
          FUNC_DIR="lambda/${{ matrix.function.dir }}"
          echo "📦 Packaging $FUNC_NAME from $FUNC_DIR"
          cd "$FUNC_DIR"
          zip -q "../../${FUNC_NAME}.zip" lambda_function.py
          cd ../..
          echo "FUNC_NAME=$FUNC_NAME" >> $GITHUB_ENV

      - name: Update Lambda code
        run: |
          echo "⬆️  Updating $FUNC_NAME code..."
          aws lambda update-function-code \
            --function-name "$FUNC_NAME" \
            --zip-file "fileb://${FUNC_NAME}.zip" \
            --region $AWS_REGION \
            --no-cli-pager
          aws lambda wait function-updated \
            --function-name "$FUNC_NAME" \
            --region $AWS_REGION

      - name: Publish Lambda version
        id: publish
        run: |
          VERSION=$(aws lambda publish-version \
            --function-name "$FUNC_NAME" \
            --description "CI/CD deploy ${{ github.sha }} $(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --region $AWS_REGION \
            --query 'Version' \
            --output text \
            --no-cli-pager)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "🏷️  Published version: $VERSION"

      - name: Get current alias version (Blue)
        id: blue_version
        run: |
          CURRENT=$(aws lambda get-alias \
            --function-name "$FUNC_NAME" \
            --name "live" \
            --region $AWS_REGION \
            --query 'FunctionVersion' \
            --output text \
            --no-cli-pager 2>/dev/null || echo "1")
          echo "CURRENT_VERSION=$CURRENT" >> $GITHUB_OUTPUT
          echo "🔵 Blue version: $CURRENT → 🟢 Green version: ${{ steps.publish.outputs.VERSION }}"

      - name: Create CodeDeploy AppSpec and upload to S3
        run: |
          S3_BUCKET="${{ secrets.S3_DEPLOYMENT_BUCKET }}"
          S3_KEY="codedeploy/${FUNC_NAME}/appspec-${{ github.sha }}.json"
          cat > /tmp/appspec.json <<EOF
          {
            "version": 0.0,
            "Resources": [{
              "${FUNC_NAME}": {
                "Type": "AWS::Lambda::Function",
                "Properties": {
                  "Name": "${FUNC_NAME}",
                  "Alias": "live",
                  "CurrentVersion": "${{ steps.blue_version.outputs.CURRENT_VERSION }}",
                  "TargetVersion": "${{ steps.publish.outputs.VERSION }}"
                }
              }
            }],
            "Hooks": [
              { "BeforeAllowTraffic": "techno-lambda-health-check" },
              { "AfterAllowTraffic": "techno-lambda-health-check" }
            ]
          }
          EOF
          aws s3 cp /tmp/appspec.json "s3://${S3_BUCKET}/${S3_KEY}" --region $AWS_REGION
          echo "S3_BUCKET=$S3_BUCKET" >> $GITHUB_ENV
          echo "S3_KEY=$S3_KEY" >> $GITHUB_ENV

      - name: Trigger CodeDeploy Blue/Green deployment
        id: codedeploy
        run: |
          DEPLOYMENT_ID=$(aws deploy create-deployment \
            --application-name "$APP_NAME" \
            --deployment-group-name "$DEPLOYMENT_GROUP" \
            --deployment-config-name "CodeDeployDefault.LambdaCanary10Percent5Minutes" \
            --revision "revisionType=S3,s3Location={bucket=${S3_BUCKET},key=${S3_KEY},bundleType=JSON}" \
            --description "Deploy ${FUNC_NAME} v${{ steps.publish.outputs.VERSION }} from ${{ github.sha }}" \
            --region $AWS_REGION \
            --query 'deploymentId' \
            --output text \
            --no-cli-pager)
          echo "DEPLOYMENT_ID=$DEPLOYMENT_ID" >> $GITHUB_OUTPUT
          echo "🎯 Deployment ID: $DEPLOYMENT_ID"

      - name: Wait for deployment to succeed
        run: |
          echo "⏳ Canary deployment: 10% traffic for 5 minutes..."
          aws deploy wait deployment-successful \
            --deployment-id "${{ steps.codedeploy.outputs.DEPLOYMENT_ID }}" \
            --region $AWS_REGION
          echo "✅ $FUNC_NAME deployment successful!"

  # ─────────────────────────────────────────────────────────────
  # JOB 4: Deploy Frontend via AWS Amplify
  # ─────────────────────────────────────────────────────────────
  deploy-frontend:
    name: "🌐 Deploy Frontend (AWS Amplify)"
    runs-on: ubuntu-latest
    needs: [deploy-lambda]
    if: github.ref == 'refs/heads/master'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate frontend files
        run: |
          echo "🔍 Validating frontend files..."
          test -f frontend/index.html && echo "✅ index.html found"
          test -f amplify.yml && echo "✅ amplify.yml found"
          FILESIZE=$(wc -c < frontend/index.html)
          echo "   index.html size: $FILESIZE bytes"

      - name: Trigger Amplify build
        id: amplify_build
        run: |
          AMPLIFY_APP_ID="${{ secrets.AMPLIFY_APP_ID }}"
          BRANCH_NAME="master"
          JOB_ID=$(aws amplify start-job \
            --app-id "$AMPLIFY_APP_ID" \
            --branch-name "$BRANCH_NAME" \
            --job-type "RELEASE" \
            --commit-id "${{ github.sha }}" \
            --commit-message "CI/CD deploy: ${{ github.sha }}" \
            --region $AWS_REGION \
            --query 'jobSummary.jobId' \
            --output text \
            --no-cli-pager)
          echo "JOB_ID=$JOB_ID" >> $GITHUB_OUTPUT
          echo "🔨 Amplify Job ID: $JOB_ID"

      - name: Monitor Amplify build progress
        run: |
          AMPLIFY_APP_ID="${{ secrets.AMPLIFY_APP_ID }}"
          JOB_ID="${{ steps.amplify_build.outputs.JOB_ID }}"
          echo "⏳ Waiting for Amplify build to complete..."
          for i in {1..30}; do
            STATUS=$(aws amplify get-job \
              --app-id "$AMPLIFY_APP_ID" \
              --branch-name "master" \
              --job-id "$JOB_ID" \
              --region $AWS_REGION \
              --query 'job.summary.status' \
              --output text \
              --no-cli-pager)
            echo "   Attempt $i/30 - Status: $STATUS"
            if [ "$STATUS" == "SUCCEED" ]; then
              echo "✅ Amplify frontend deployed successfully!"
              exit 0
            elif [ "$STATUS" == "FAILED" ] || [ "$STATUS" == "CANCELLED" ]; then
              echo "❌ Amplify build $STATUS"
              exit 1
            fi
            sleep 30
          done
          echo "⏰ Timeout waiting for Amplify build"
          exit 1

  # ─────────────────────────────────────────────────────────────
  # JOB 5: Notify deployment result via SNS
  # ─────────────────────────────────────────────────────────────
  notify:
    name: "📢 Send Deployment Notification"
    runs-on: ubuntu-latest
    needs: [deploy-lambda, deploy-frontend]
    if: always() && github.ref == 'refs/heads/master'

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Determine deployment status
        id: status
        run: |
          LAMBDA_RESULT="${{ needs.deploy-lambda.result }}"
          FRONTEND_RESULT="${{ needs.deploy-frontend.result }}"
          if [ "$LAMBDA_RESULT" == "success" ] && [ "$FRONTEND_RESULT" == "success" ]; then
            echo "STATUS=✅ SUCCESS" >> $GITHUB_OUTPUT
            echo "EMOJI=✅" >> $GITHUB_OUTPUT
          else
            echo "STATUS=❌ FAILED" >> $GITHUB_OUTPUT
            echo "EMOJI=❌" >> $GITHUB_OUTPUT
          fi

      - name: Send deployment report via SNS
        run: |
          STATUS="${{ steps.status.outputs.STATUS }}"
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          MESSAGE="${{ steps.status.outputs.EMOJI }} Deployment Report

Pipeline: techno-serverless-cicd
Status: $STATUS
Environment: production (us-east-1)
Commit: ${{ github.sha }}
Actor: ${{ github.actor }}
Branch: ${{ github.ref_name }}
Timestamp: $TIMESTAMP

Job Results:
- Lambda Deploy: ${{ needs.deploy-lambda.result }}
- Frontend Deploy: ${{ needs.deploy-frontend.result }}

Strategy: Blue/Green (LambdaCanary10Percent5Minutes)
Functions deployed: 7 Lambda functions
Frontend: AWS Amplify

View run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          aws sns publish \
            --topic-arn "$SNS_TOPIC_ARN" \
            --subject "${{ steps.status.outputs.EMOJI }} Deploy $STATUS - techno-serverless" \
            --message "$MESSAGE" \
            --region $AWS_REGION \
            --no-cli-pager

          echo "📢 Deployment notification sent via SNS"
          echo "Pipeline result: $STATUS"
