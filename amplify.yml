version: 1
frontend:
  phases:
    preBuild:
      commands:
        - echo "Current directory: $(pwd)"
        - echo "Listing all files:"
        - ls -la
        - echo "Listing frontend directory:"
        - ls -la frontend/ || echo "frontend directory not found!"
        - echo "Looking for index.html:"
        - find . -name "index.html" -type f || echo "index.html not found anywhere!"
        - test -f frontend/index.html && echo "✓ index.html found at frontend/index.html" || (echo "✗ index.html NOT FOUND at frontend/index.html" && exit 1)
    build:
      commands:
        - echo "No build step required - static HTML"
        - echo "API config dilakukan via Settings page di frontend (localStorage)"
    postBuild:
      commands:
        - echo "Build done"
        - ls -la frontend/
  artifacts:
    baseDirectory: frontend
    files:
      - "**/*"
  cache:
    paths: []
